<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect x="15" y="15" width="870" height="430" rx="28" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>

  <text x="60" y="78" font-size="30" font-family="Arial, Helvetica, sans-serif" fill="#0f172a">
    8-site periodic ring
  </text>

  <circle cx="300" cy="260" r="115" fill="none" stroke="#94a3b8" stroke-width="5"/>

  <line x1="415" y1="260" x2="381.32" y2="178.68" stroke="#cbd5e1" stroke-width="5"/>
  <line x1="381.32" y1="178.68" x2="300" y2="145" stroke="#cbd5e1" stroke-width="5"/>
  <line x1="300" y1="145" x2="218.68" y2="178.68" stroke="#cbd5e1" stroke-width="5"/>
  <line x1="218.68" y1="178.68" x2="185" y2="260" stroke="#cbd5e1" stroke-width="5"/>
  <line x1="185" y1="260" x2="218.68" y2="341.32" stroke="#cbd5e1" stroke-width="5"/>
  <line x1="218.68" y1="341.32" x2="300" y2="375" stroke="#cbd5e1" stroke-width="5"/>
  <line x1="300" y1="375" x2="381.32" y2="341.32" stroke="#cbd5e1" stroke-width="5"/>
  <line x1="381.32" y1="341.32" x2="415" y2="260" stroke="#cbd5e1" stroke-width="5"/>

  <circle cx="415" cy="260" r="24" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
  <text x="415" y="268" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="white">0</text>

  <circle cx="381.32" cy="178.68" r="24" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
  <text x="381.32" y="186.68" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="white">7</text>

  <circle cx="300" cy="145" r="24" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
  <text x="300" y="153" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="white">6</text>

  <circle cx="218.68" cy="178.68" r="24" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
  <text x="218.68" y="186.68" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="white">5</text>

  <circle cx="185" cy="260" r="24" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
  <text x="185" y="268" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="white">4</text>

  <circle cx="218.68" cy="341.32" r="24" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
  <text x="218.68" y="349.32" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="white">3</text>

  <circle cx="300" cy="375" r="24" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
  <text x="300" y="383" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="white">2</text>

  <circle cx="381.32" cy="341.32" r="24" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
  <text x="381.32" y="349.32" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="white">1</text>

  <path d="M 448 242 A 150 150 0 0 1 411 364" fill="none" stroke="#0f766e" stroke-width="7" marker-end="url(#arrowhead)"/>
  <text x="505" y="142" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#0f766e">clockwise shift</text>
  <text x="505" y="174" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#0f766e">example: 0 → 1</text>

  <text x="505" y="260" font-size="24" font-family="Arial, Helvetica, sans-serif" fill="#0f172a">What symmetry is used?</text>
  <text x="505" y="297" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#334155">A rigid shift of every site label leaves</text>
  <text x="505" y="325" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#334155">the Hamiltonian unchanged.</text>
  <text x="505" y="372" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#7c3aed">Finite order: T⁸ = I</text>
  <text x="505" y="402" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#7c3aed">After 8 shifts, every site returns to itself.</text>
</svg>
